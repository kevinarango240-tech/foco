<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foco</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='7' fill='%23ff6b1a'/%3E%3Ccircle cx='16' cy='16' r='12' fill='none' stroke='%23ff6b1a' stroke-opacity='.4' stroke-width='2'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="brand-dot" aria-hidden="true"></span>
            <span class="brand-name">FOCO</span>
        </div>

        <nav class="date-nav" aria-label="Navegación de fecha">
            <button type="button" class="icon-btn" data-action="prev-day" aria-label="Día anterior">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button type="button" class="date-display" data-action="pick-date" aria-label="Elegir fecha">
                <span id="dateLabel">—</span>
                <input type="date" id="datePicker" aria-hidden="true" tabindex="-1">
            </button>
            <button type="button" class="icon-btn" data-action="next-day" aria-label="Día siguiente">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button type="button" class="today-btn" data-action="today">Hoy</button>
        </nav>

        <button type="button" class="icon-btn theme-toggle" data-action="toggle-theme" aria-label="Cambiar tema">
            <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4L7 17M17 7l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
    </header>

    <section class="stats" aria-label="Resumen del día">
        <div class="stat">
            <span class="stat-label">Tiempo enfocado</span>
            <span class="stat-value" id="statFocus">0m</span>
        </div>
        <div class="stat">
            <span class="stat-label">Tareas hechas</span>
            <span class="stat-value"><span id="statDone">0</span><span class="stat-sub">/<span id="statTotal">0</span></span></span>
        </div>
        <div class="stat">
            <span class="stat-label">Ciclos pomodoro</span>
            <span class="stat-value" id="statCycles">0</span>
        </div>
        <div class="stat stat-progress">
            <span class="stat-label">Progreso</span>
            <div class="progress"><div class="progress-bar" id="statBar"></div></div>
            <span class="stat-value stat-pct" id="statPct">0%</span>
        </div>
    </section>

    <main class="timeline-wrap">
        <ul class="timeline" id="timeline" aria-label="Nodos del día"></ul>
        <div class="timeline-empty" id="emptyState" hidden>
            <h2>Empieza tu día</h2>
            <p>Crea tu primer nodo para organizar tu trabajo y descansos.</p>
        </div>
    </main>

    <aside class="pomodoro" id="pomodoro" aria-label="Temporizador Pomodoro">
        <button type="button" class="pomodoro-toggle icon-btn" data-action="toggle-dock" aria-label="Colapsar temporizador">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="pomodoro-body">
            <div class="pomodoro-ring">
                <svg viewBox="0 0 120 120" width="120" height="120" aria-hidden="true">
                    <circle cx="60" cy="60" r="54" class="ring-track"/>
                    <circle cx="60" cy="60" r="54" class="ring-progress" id="ringProgress"/>
                </svg>
                <div class="pomodoro-time" id="pomoTime" aria-live="polite">25:00</div>
            </div>
            <div class="pomodoro-meta">
                <span class="pomodoro-phase" id="pomoPhase">Listo</span>
                <span class="pomodoro-cycle">Ciclo <span id="pomoCycle">0</span>/4</span>
            </div>
            <div class="pomodoro-controls">
                <button type="button" class="primary-btn" data-action="pomo-start" id="pomoStart">Start</button>
                <button type="button" class="ghost-btn" data-action="pomo-pause" id="pomoPause" hidden>Pausar</button>
                <button type="button" class="ghost-btn" data-action="pomo-reset">Reset</button>
            </div>
        </div>
    </aside>

    <button type="button" class="fab" data-action="new-node" aria-label="Nuevo nodo">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Nuevo nodo</span>
    </button>

    <dialog id="nodeDialog" class="dialog">
        <form method="dialog" id="nodeForm" class="dialog-form">
            <h2>Nuevo nodo</h2>
            <fieldset class="type-picker" aria-label="Tipo de nodo">
                <label>
                    <input type="radio" name="type" value="work" checked>
                    <span>Tarea</span>
                </label>
                <label>
                    <input type="radio" name="type" value="break">
                    <span>Descanso</span>
                </label>
            </fieldset>
            <label class="field">
                <span>Título</span>
                <input type="text" name="title" required maxlength="60" placeholder="Deep work, Reunión, Café…">
            </label>
            <label class="field field-duration">
                <span>Duración (min)</span>
                <input type="number" name="duration" min="1" max="240" value="15">
            </label>
            <div class="dialog-actions">
                <button type="button" class="ghost-btn" data-action="dialog-cancel">Cancelar</button>
                <button type="submit" class="primary-btn">Crear</button>
            </div>
        </form>
    </dialog>

    <script src="main.js"></script>
</body>
</html>
